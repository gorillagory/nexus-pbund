name: Nexus Preflight

on:
  push:
  pull_request:

jobs:
  preflight:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          python -m pip install flask sqlalchemy watchdog psutil psycopg2-binary

      - name: Run Nexus quick preflight
        run: python3 scripts/nexus_preflight.py --quick --strict-clean
